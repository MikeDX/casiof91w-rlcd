; Casio F-91W on Waveshare ESP32-S3 RLCD 4.2"
; Copyright (c) 2025 MikeDX — MIT — https://github.com/mikedx/casiof91w-rlcd
;
; Waveshare ESP32-S3-RLCD-4.2 (16MB flash, 8MB OPI PSRAM) — match rlcd42gnw / M5Tab5
[env:waveshare_rlcd42]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = default, esp32_exception_decoder
build_type = release

board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.flash_freq = 80m
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=3

lib_deps =
  Wire
